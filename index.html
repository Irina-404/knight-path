<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Knight's Path</title>
    <style>
      html,
      body {
        width: 100%;
        height: 100%;
        margin: 0;
        overflow: hidden;
        background: #000;
      }

      body {
        display: flex;
        align-items: center;
        justify-content: center;
        font-family: Arial, Helvetica, sans-serif;
      }

      canvas {
        display: block;
      }

      .fallback {
        max-width: 32rem;
        padding: 1rem;
        color: #f5ecd7;
        text-align: center;
        line-height: 1.4;
      }

      .hidden {
        display: none;
      }
    </style>
  </head>
  <body>
    <noscript>
      <p class="fallback">Knight's Path needs JavaScript to run.</p>
    </noscript>
    <canvas id="gameCanvas" aria-label="Knight's Path game canvas"></canvas>
    <p id="canvasFallback" class="fallback hidden">Your browser does not support HTML5 Canvas.</p>
    <script src="state.js"></script>
    <script src="render.js"></script>
    <script src="game.js"></script>
  </body>
</html>
